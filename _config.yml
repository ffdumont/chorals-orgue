title: Chorals d'orgue
description: Partitions, enregistrements et commentaires autour du répertoire d'orgue
author: ffdumont
baseurl: "/chorals-orgue"
url: "https://ffdumont.github.io"

remote_theme: just-the-docs/just-the-docs
plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# Just the Docs settings
color_scheme: light
search_enabled: true
heading_anchors: true
nav_external_links:
  - title: GitHub
    url: https://github.com/ffdumont/chorals-orgue

# Giscus (commentaires) - à remplacer après activation Giscus
giscus:
  repo: "ffdumont/chorals-orgue"
  repo_id: "R_kgDOSHoKxA"
  category: "General"
  category_id: "DIC_kwDOSHoKxM4C7Rgr"
  mapping: "pathname"
  theme: "preferred_color_scheme"

# Jekyll config
markdown: kramdown
permalink: pretty

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
