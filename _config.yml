title: Chorals d'orgue
description: Partitions, enregistrements et commentaires autour du répertoire d'orgue
author: ffdumont
baseurl: "/chorals-orgue"
url: "https://ffdumont.github.io"

theme: just-the-docs

# Just the Docs settings
color_scheme: light
search_enabled: true
heading_anchors: true
nav_external_links:
  - title: GitHub
    url: https://github.com/ffdumont/chorals-orgue

# Giscus (commentaires) - à remplacer après activation Giscus
giscus:
  repo: "ffdumont/chorals-orgue"
  repo_id: "REPO_ID_TO_REPLACE"
  category: "General"
  category_id: "CATEGORY_ID_TO_REPLACE"
  mapping: "pathname"
  theme: "light"

# Jekyll config
markdown: kramdown
permalink: pretty

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
