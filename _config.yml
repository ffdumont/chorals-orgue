title: Chorals d'orgue
description: Partitions, enregistrements et commentaires autour du répertoire d'orgue
author: ffdumont
baseurl: "/chorals-orgue"
url: "https://ffdumont.github.io"
lang: fr

theme: minima

plugins:
  - jekyll-seo-tag

# Ordre des liens dans la nav horizontale du header minima.
header_pages:
  - projet.md
  - pieces/bwv639.md
  - pieces/bwv572.md
  - pieces/setup-technique.md
  - journal.md

minima:
  skin: classic

# Giscus (commentaires) — inclus uniquement sur les pages /pieces/
giscus:
  repo: "ffdumont/chorals-orgue"
  repo_id: "R_kgDOSHoKxA"
  category: "General"
  category_id: "DIC_kwDOSHoKxM4C7Rgr"
  mapping: "pathname"
  theme: "preferred_color_scheme"

markdown: kramdown
permalink: pretty

exclude:
  - README.md
  - CLAUDE.md
  - docs/memoires.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - proto
